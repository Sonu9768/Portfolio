<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonu Kumar | Choose Your Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chooser.css">
</head>
<body>
  <div id="custom-cursor"></div>
  <canvas id="matrix-canvas"></canvas>
  
  <div class="split-container">
    <a href="graphics/index.html" class="split-panel design-panel" onmouseenter="changeCursor('design')" onmouseleave="resetCursor()">
      <div class="panel-content">
        <h2>Graphic Designer</h2>
        <p>Explore editorial layouts, brand identities, and visual storytelling.</p>
        <span class="enter-btn">ENTER PORTFOLIO</span>
      </div>
    </a>
    
    <a href="security/index.html" class="split-panel security-panel" onmouseenter="changeCursor('security')" onmouseleave="resetCursor()">
      <div class="panel-content">
        <h2>Security Expert</h2>
        <p>Explore offensive security, red team ops, and terminal environments.</p>
        <span class="enter-btn">INITIATE CONNECTION</span>
      </div>
    </a>
  </div>

  <script src="chooser.js"></script>
</body>
</html>
