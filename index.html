<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonu Jaiswal | Professional OS v5.0</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="os-body">
  <canvas id="matrix-canvas"></canvas>
  <div id="boot-screen">
    <div class="boot-content">
      <p id="boot-log">> System Check: OK<br>> Net Interface: UP<br>> Welcome, Administrator...</p>
    </div>
  </div>

  <div id="desktop" ondragover="allowDrop(event)" ondrop="dropIcon(event)">
    <div class="icons-grid" id="desktop-icons">
      <!-- Standard Folders -->
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('device')">
        <i class="fas fa-laptop-code"></i>
        <span>This_Device</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('performance')">
        <i class="fas fa-gauge-high"></i>
        <span>Performance</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('projects')">
        <i class="fas fa-folder-tree"></i>
        <span>Projects_Dir</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('experience')">
        <i class="fas fa-briefcase"></i>
        <span>Experience</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('creds')">
        <i class="fas fa-certificate"></i>
        <span>Certificates</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('hobbies')">
        <i class="fas fa-palette"></i>
        <span>Hobbies</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('terminal')">
        <i class="fas fa-terminal"></i>
        <span>Root_Terminal</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('games')">
        <i class="fas fa-gamepad"></i>
        <span>Games.sys</span>
      </div>
      <div class="os-icon" draggable="true" ondragstart="dragIconStart(event)" onclick="openWin('tools')">
        <i class="fas fa-toolbox"></i>
        <span>Tools</span>
      </div>
    </div>

    <div id="windows-container"></div>
  </div>

  <footer id="taskbar">
    <div class="start-btn" onclick="toggleMenu()"><i class="fas fa-shield-halved"></i> START</div>
    <div id="active-apps"></div>
    <div class="system-tray">
      <i class="fas fa-shield-virus" title="Protected"></i>
      <span id="os-clock">00:00:00</span>
    </div>
  </footer>

  <div id="start-menu">
     <div class="menu-header">
        <img src="profile.png" alt="User">
        <div>
           <h4>Sonu Jaiswal</h4>
           <p>Security Architect</p>
        </div>
     </div>
     <div class="menu-items">
        <div onclick="openWin('device')" class="menu-item-link"><i class="fas fa-user"></i> This Device</div>
        <div onclick="openWin('terminal')" class="menu-item-link"><i class="fas fa-terminal"></i> Terminal</div>
        <div onclick="openWin('tools')" class="menu-item-link"><i class="fas fa-toolbox"></i> Tools</div>
        <hr>
        <a href="mailto:sonuzaiswal@gmail.com"><i class="fas fa-envelope"></i> Email</a>
        <a href="Sonu Kumar CV.pdf" download><i class="fas fa-file-pdf"></i> Resume</a>
        <div onclick="location.reload()" class="menu-item-link"><i class="fas fa-power-off"></i> Reboot</div>
     </div>
  </div>

  <script src="script.js?v=2"></script>
</body>
</html>
